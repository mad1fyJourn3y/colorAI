<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ColorAI</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* Camera */
video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

/* Overlay */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.15);
}

/* Center box */
.box {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 220px;
    height: 220px;
    transform: translate(-50%, -50%);
    border: 2px solid rgba(255,255,255,0.7);
    border-radius: 18px;
}

/* Target circle */
.circle {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 70px;
    height: 70px;
    transform: translate(-50%, -50%);
    border: 3px solid red;
    border-radius: 50%;
}

/* Bottom panel */
.panel {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 14px;
    background: rgba(0,0,0,0.65);
    color: white;
    text-align: center;
    backdrop-filter: blur(10px);
}

.colorBox {
    width: 45px;
    height: 45px;
    margin: 10px auto;
    border-radius: 10px;
    border: 2px solid white;
}

/* Start button */
button {
    position: fixed;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: white;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<button id="startBtn">Start ColorAI</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div class="overlay"></div>
<div class="box"></div>
<div class="circle"></div>

<div class="panel">
    <div id="name">Color: -</div>
    <div id="rgb">RGB: -</div>
    <div class="colorBox" id="preview"></div>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const nameEl = document.getElementById("name");
const rgbEl = document.getElementById("rgb");
const preview = document.getElementById("preview");
const button = document.getElementById("startBtn");

let running = false;

/* START CAMERA (FIXED FOR GITHUB PAGES) */
button.addEventListener("click", async () => {

    try {
        console.log("Requesting camera...");

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" } }
        });

        video.srcObject = stream;
        await video.play();

        running = true;
        requestAnimationFrame(scan);

        console.log("Camera started");

    } catch (err) {
        console.log("Back camera failed, trying default...", err);

        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: true
            });

            video.srcObject = stream;
            await video.play();

            running = true;
            requestAnimationFrame(scan);

        } catch (err2) {
            console.error(err2);
            alert("Camera blocked. Please allow permissions in browser settings.");
        }
    }
});

/* BETTER COLOR DETECTION */
function getColor(r,g,b){

    let max = Math.max(r,g,b);
    let min = Math.min(r,g,b);
    let diff = max - min;

    if (max < 50) return "Black";
    if (diff < 15 && max > 200) return "White";
    if (diff < 15) return "Gray";

    if (r > g && r > b) {
        if (g > 120) return "Orange";
        return "Red";
    }

    if (g > r && g > b) {
        if (b > 120) return "Teal/Cyan";
        return "Green";
    }

    if (b > r && b > g) return "Blue";

    if (r > 200 && g > 200) return "Yellow";

    return "Unknown";
}

/* SCAN LOOP */
function scan(){

    if(!running) return;

    if(video.readyState === 4){

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video,0,0);

        const size = 70;
        const x = canvas.width/2 - size/2;
        const y = canvas.height/2 - size/2;

        const data = ctx.getImageData(x,y,size,size).data;

        let r=0,g=0,b=0;

        for(let i=0;i<data.length;i+=4){
            r += data[i];
            g += data[i+1];
            b += data[i+2];
        }

        let total = data.length/4;
        r = Math.floor(r/total);
        g = Math.floor(g/total);
        b = Math.floor(b/total);

        const color = getColor(r,g,b);

        nameEl.innerText = "Color: " + color;
        rgbEl.innerText = `RGB: ${r}, ${g}, ${b}`;
        preview.style.background = `rgb(${r},${g},${b})`;
    }

    requestAnimationFrame(scan);
}
</script>

</body>
</html>
